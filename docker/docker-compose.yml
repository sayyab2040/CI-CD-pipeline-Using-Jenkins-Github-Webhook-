services:
  db:
    image: mysql:8.0
    container_name: login-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: login_app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../app/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
    container_name: login-backend
    restart: always
    ports:
      - "5000:3000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: login_app
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - app-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile
    container_name: login-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:

networks:
  app-network:
    driver: bridge