<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Tier Website</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --text-color: #111827;
            --box-bg: #FFFFFF;
            --success-color: #059669;
            --error-color: #DC2626;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--box-bg);
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        #response-container {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        .success {
            background-color: #D1FAE5;
            color: var(--success-color);
            border: 1px solid #A7F3D0;
            display: block !important;
        }
        .error {
            background-color: #FEE2E2;
            color: var(--error-color);
            border: 1px solid #FECACA;
            display: block !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Greeting Service</h1>
        <form id="greeting-form">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            <button type="submit">Submit</button>
        </form>
        <div id="response-container"></div>
    </div>

    <script>
        const form = document.getElementById('greeting-form');
        const responseContainer = document.getElementById('response-container');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;

            responseContainer.className = '';
            responseContainer.textContent = 'Sending...';
            responseContainer.style.display = 'block';

            try {
                const response = await fetch(`${window.location.protocol}//${window.location.hostname}:3000/api/message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.text();
                responseContainer.textContent = data;
                responseContainer.classList.add('success');
            } catch (error) {
                console.error(error);
                responseContainer.textContent = 'Failed to connect to the backend API.';
                responseContainer.classList.add('error');
            }
        });
    </script>
</body>
</html>
